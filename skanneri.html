<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skanneri Docs-tiedostoon</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-kamera { background: #4285F4; color: white; padding: 15px 20px; border: none; border-radius: 5px; font-size: 18px; width: 100%; cursor: pointer; display: block; box-sizing: border-box;}
        #cameraInput { display: none; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        #result { margin-top: 20px; text-align: left; background: #f9f9f9; padding: 10px; border-left: 4px solid #4285F4; min-height: 50px; white-space: pre-wrap; font-size: 14px; word-break: break-word;}
        #hiddenCanvas { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Skannaa tekstiä</h2>
        <p>Aseta teksti hyvään valoon ja ota kuva läheltä.</p>

        <label for="cameraInput" class="btn-kamera">📸 Ota kuva tekstistä</label>
        <input type="file" accept="image/*" capture="environment" id="cameraInput">

        <div id="status">Odotetaan kuvaa...</div>
        <div id="result">Tulokset ja mahdolliset virheet näkyvät tässä.</div>
        <canvas id="hiddenCanvas"></canvas>
    </div>

    <script>
        // TÄSSÄ ON UUSI OSOITTEESI!
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxBtsR0xIR4gCQ795V1GBrURnciRXlOzps487q6Szu2SFwPAD-54IOO7YIdYEwa_7SHMA/exec';

        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');

            statusEl.innerText = 'Parannetaan kuvan laatua...';
            statusEl.style.color = '#fbbc05';
            resultEl.innerText = '';

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.getElementById('hiddenCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxWidth = 1000;
                    const scale = Math.min(maxWidth / img.width, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Tehdään kuvasta mustavalkoinen ja nostetaan kontrastia
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        let kirkkaus = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        let kontrasti = (kirkkaus - 128) * 1.5 + 128; // Lisätään kontrastia
                        kontrasti = Math.max(0, Math.min(255, kontrasti));
                        data[i] = kontrasti;
                        data[i+1] = kontrasti;
                        data[i+2] = kontrasti;
                    }
                    ctx.putImageData(imgData, 0, 0);

                    const processedImageData = canvas.toDataURL('image/jpeg', 0.8);
                    statusEl.innerText = 'Tekoäly lukee tekstiä (odota n. 10 sekuntia)...';

                    try {
                        const { data: { text } } = await Tesseract.recognize(processedImageData, 'fin+eng');

                        if (!text.trim()) {
                            statusEl.innerText = 'Kuvasta ei löytynyt luettavaa tekstiä.';
