<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skanneri → Google Docs</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #242734;
            --border: #2e3241;
            --text: #e8eaed;
            --text-dim: #8b8fa3;
            --accent: #6c9fff;
            --accent-glow: rgba(108, 159, 255, 0.15);
            --success: #4ade80;
            --success-glow: rgba(74, 222, 128, 0.15);
            --warn: #fbbf24;
            --danger: #f87171;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
        }

        .header { text-align: center; padding: 24px 0 20px; }
        .header h1 {
            font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6c9fff, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header p { font-size: 13px; color: var(--text-dim); margin-top: 4px; }

        .steps { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
        .step-dot { width: 32px; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.4s, box-shadow 0.4s; }
        .step-dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
        .step-dot.done { background: var(--success); }

        .camera-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #4a6cf7, #6c5ce7);
            border: none; border-radius: var(--radius); color: white;
            font-family: inherit; font-size: 17px; font-weight: 600;
            cursor: pointer; box-shadow: 0 4px 20px rgba(74, 108, 247, 0.35);
            transition: transform 0.15s;
        }
        .camera-btn:active { transform: scale(0.97); }
        .camera-btn svg { width: 22px; height: 22px; }
        #cameraInput { display: none; }

        .crop-area { display: none; margin-top: 16px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: #000; }
        .crop-area.visible { display: block; }
        #imageToCrop { max-width: 100%; display: block; }

        .mode-bar { display: none; margin-top: 12px; gap: 8px; }
        .mode-bar.visible { display: flex; }
        .mode-chip {
            flex: 1; padding: 10px 8px; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-dim); font-family: inherit; font-size: 13px;
            font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .mode-chip.selected { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
        .mode-chip small { display: block; font-size: 10px; margin-top: 2px; opacity: 0.7; }

        .lang-bar { display: none; margin-top: 8px; gap: 6px; flex-wrap: wrap; }
        .lang-bar.visible { display: flex; }
        .lang-chip {
            padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; color: var(--text-dim); font-family: inherit; font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .lang-chip.selected { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

        .info-box {
            margin-top: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 12px; color: var(--text-dim); line-height: 1.5; display: none;
        }
        .info-box.visible { display: block; }

        /* Fixed scan button */
        .scan-btn-wrap {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 100;
        }
        .scan-btn-wrap.visible { display: block; }
        .scan-btn {
            display: block; width: 100%; max-width: 480px; margin: 0 auto; padding: 16px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none; border-radius: var(--radius); color: white;
            font-family: inherit; font-size: 17px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3); transition: transform 0.15s;
        }
        .scan-btn:active { transform: scale(0.97); }
        .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-card {
            margin-top: 16px; padding: 14px 16px; background: var(--surface);
            border-radius: var(--radius); border: 1px solid var(--border);
            font-size: 14px; color: var(--text-dim); display: flex; align-items: center; gap: 10px; transition: all 0.3s;
        }
        .status-card.scanning { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
        .status-card.success { border-color: var(--success); background: var(--success-glow); color: var(--success); }
        .status-card.error { border-color: var(--danger); background: rgba(248,113,113,0.1); color: var(--danger); }

        .progress-wrap { display: none; margin-top: 12px; background: var(--surface-2); border-radius: 6px; height: 6px; overflow: hidden; }
        .progress-wrap.visible { display: block; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 6px; width: 0%; transition: width 0.3s ease; }

        .result-card { display: none; margin-top: 16px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        .result-card.visible { display: block; }
        .result-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .result-header span { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .copy-btn { padding: 5px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 12px; cursor: pointer; }
        .result-text { padding: 14px 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto; color: var(--text); }
        .result-text[contenteditable="true"]:focus { outline: none; background: var(--surface-2); }

        .action-bar { display: none; gap: 8px; margin-top: 12px; }
        .action-bar.visible { display: flex; }
        .action-btn {
            flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius);
            background: var(--surface); color: var(--text); font-family: inherit; font-size: 14px;
            font-weight: 500; cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .action-btn.primary { background: linear-gradient(135deg, #4a6cf7, #6c5ce7); border-color: transparent; box-shadow: 0 2px 12px rgba(74,108,247,0.25); }
        .action-btn:active { transform: scale(0.97); }

        .retry-area { display: none; margin-top: 12px; }
        .retry-area.visible { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

        #hiddenCanvas { display: none; }
        .cropper-line { background: var(--accent); }
        .cropper-point { background: var(--accent); width: 12px !important; height: 12px !important; border-radius: 50%; }
        .cropper-modal { background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>📄 Skanneri</h1>
        <p>Kuvasta tekstiksi → Google Docs</p>
    </div>

    <div class="steps">
        <div class="step-dot active" id="step1"></div>
        <div class="step-dot" id="step2"></div>
        <div class="step-dot" id="step3"></div>
    </div>

    <label for="cameraInput" class="camera-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Ota kuva tai valitse tiedosto
    </label>
    <input type="file" accept="image/*" capture="environment" id="cameraInput">

    <div class="crop-area" id="cropArea">
        <img id="imageToCrop" src="" alt="Rajaa kuva">
    </div>

    <div class="mode-bar" id="modeBar">
        <button class="mode-chip selected" data-mode="cloud">☁️ Cloud Vision<small>Myös käsinkirjoitus</small></button>
        <button class="mode-chip" data-mode="local">📱 Paikallinen<small>Tesseract (offline)</small></button>
    </div>

    <div class="lang-bar" id="langBar">
        <button class="lang-chip selected" data-lang="fin+eng">🇫🇮 Suomi + EN</button>
        <button class="lang-chip" data-lang="fin">🇫🇮 Vain suomi</button>
        <button class="lang-chip" data-lang="eng">🇬🇧 Vain englanti</button>
        <button class="lang-chip" data-lang="swe+fin">🇸🇪 Ruotsi + FI</button>
    </div>

    <div class="info-box" id="cloudInfo">
        ☁️ <strong>Cloud Vision</strong> tunnistaa painetun ja käsinkirjoitetun tekstin.<br>
        Tarvitsee päivitetyn Apps Scriptin (ohjeet alla).
    </div>

    <div class="status-card" id="statusCard">Ota kuva tai valitse kuvatiedosto</div>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="result-card" id="resultCard">
        <div class="result-header">
            <span>Tunnistettu teksti</span>
            <button class="copy-btn" id="copyBtn">📋 Kopioi</button>
        </div>
        <div class="result-text" id="resultText" contenteditable="true"></div>
    </div>

    <div class="action-bar" id="actionBar">
        <button class="action-btn" id="retakeBtn">📸 Uusi kuva</button>
        <button class="action-btn primary" id="saveDocsBtn">📝 Tallenna Docsiin</button>
    </div>

    <div class="retry-area" id="retryArea">
        <button class="action-btn" style="width:100%" id="retryCropBtn">↩️ Rajaa uudelleen</button>
    </div>

    <canvas id="hiddenCanvas"></canvas>
</div>

<!-- Fixed bottom scan button -->
<div class="scan-btn-wrap" id="scanBtnWrap">
    <button class="scan-btn" id="scanBtn">🔍 Skannaa rajattu alue</button>
</div>

<script>
    // =====================================================
    // ASETUKSET – Vaihda oma Apps Script URL
    // =====================================================
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwfkLMiLNwZnRj_GUtawEcy4vYsGa0e97MRlIgjEuzm-6cZAbVUKpd0NXUUFv39iFqHhQ/exec';

    // =====================================================
    const $ = id => document.getElementById(id);
    let cropperInstance = null;
    let selectedLang = 'fin+eng';
    let ocrMode = 'cloud';
    let lastImageSrc = null;

    function setStatus(text, type = '') {
        const el = $('statusCard');
        el.className = 'status-card ' + type;
        el.innerHTML = type === 'scanning'
            ? `<div class="spinner"></div> ${text}`
            : `${{success:'✅',error:'❌','':'ℹ️'}[type]||''} ${text}`;
    }
    function setStep(n) {
        [1,2,3].forEach(i => {
            $('step'+i).className = 'step-dot'+(i<n?' done':i===n?' active':'');
        });
    }
    function showProgress(p) { $('progressWrap').classList.add('visible'); $('progressBar').style.width=p+'%'; }
    function hideProgress() { $('progressWrap').classList.remove('visible'); $('progressBar').style.width='0%'; }

    function resetUI() {
        ['cropArea','modeBar','langBar','cloudInfo','scanBtnWrap','resultCard','actionBar','retryArea']
            .forEach(id => $(id).classList.remove('visible'));
        hideProgress();
        if (cropperInstance) { cropperInstance.destroy(); cropperInstance = null; }
    }
    function showCropUI() {
        $('cropArea').classList.add('visible');
        $('modeBar').classList.add('visible');
        $('scanBtnWrap').classList.add('visible');
        updateModeUI();
    }
    function hideCropUI() {
        ['cropArea','modeBar','langBar','cloudInfo','scanBtnWrap'].forEach(id => $(id).classList.remove('visible'));
    }
    function updateModeUI() {
        if (ocrMode === 'cloud') {
            $('langBar').classList.remove('visible');
            $('cloudInfo').classList.add('visible');
        } else {
            $('langBar').classList.add('visible');
            $('cloudInfo').classList.remove('visible');
        }
    }

    // Mode & Language
    document.querySelectorAll('.mode-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-chip').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            ocrMode = btn.dataset.mode;
            updateModeUI();
        });
    });
    document.querySelectorAll('.lang-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lang-chip').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedLang = btn.dataset.lang;
        });
    });

    // Step 1: Camera
    $('cameraInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        resetUI();
        setStep(2);
        setStatus('Ladataan kuvaa…', 'scanning');

        const reader = new FileReader();
        reader.onload = function(ev) {
            lastImageSrc = ev.target.result;
            $('imageToCrop').onload = function() {
                showCropUI();
                if (cropperInstance) cropperInstance.destroy();
                cropperInstance = new Cropper($('imageToCrop'), {
                    viewMode: 1, autoCropArea: 0.85, movable: true,
                    zoomable: true, rotatable: true, scalable: false,
                    responsive: true, guides: true, highlight: true,
                });
                setStatus('Rajaa teksti ja paina vihreää nappia alhaalla ⬇️', '');
            };
            $('imageToCrop').src = lastImageSrc;
        };
        reader.readAsDataURL(file);
    });

    // Step 2: Scan
    $('scanBtn').addEventListener('click', async function() {
        if (!cropperInstance) return;
        this.disabled = true;
        setStep(3);
        setStatus('Leikataan kuvaa…', 'scanning');
        showProgress(10);

        const croppedCanvas = cropperInstance.getCroppedCanvas({
            maxWidth: 2400, maxHeight: 2400,
            imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
        });
        hideCropUI();

        let text = null;
        if (ocrMode === 'cloud') {
            const base64 = croppedCanvas.toDataURL('image/jpeg', 0.92);
            text = await scanCloud(base64);
        } else {
            text = await scanLocal(croppedCanvas);
        }

        this.disabled = false;
        if (text === null) return;

        if (!text.trim()) {
            setStatus('Tekstiä ei löytynyt. Kokeile rajata tarkemmin.', 'error');
            $('retryArea').classList.add('visible');
            hideProgress();
            return;
        }

        $('resultText').innerText = text;
        $('resultCard').classList.add('visible');
        $('actionBar').classList.add('visible');
        $('retryArea').classList.add('visible');
        setStatus(`Tunnistettu ${text.length} merkkiä. Voit muokata ennen tallennusta.`, 'success');
        hideProgress();
    });

    // Cloud Vision via Apps Script
    async function scanCloud(imageBase64) {
        setStatus('Lähetetään Cloud Visionille…', 'scanning');
        showProgress(30);
        try {
            const base64Data = imageBase64.replace(/^data:image\/\w+;base64,/, '');
            const body = new URLSearchParams();
            body.append('action', 'ocr');
            body.append('image', base64Data);

            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 30000);

            showProgress(50);
            setStatus('Cloud Vision lukee tekstiä…', 'scanning');

            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body, signal: ctrl.signal
            });
            clearTimeout(timer);
            showProgress(90);

            const result = await res.text();
            if (result.startsWith('VIRHE:')) {
                setStatus(result, 'error');
                $('retryArea').classList.add('visible');
                hideProgress();
                return null;
            }
            showProgress(100);
            return result;
        } catch (err) {
            setStatus(err.name === 'AbortError'
                ? 'Aikakatkaisu – kokeile pienempää rajausta.'
                : 'Yhteysvirhe: ' + err.message, 'error');
            $('retryArea').classList.add('visible');
            hideProgress();
            return null;
        }
    }

    // Local Tesseract
    async function scanLocal(croppedCanvas) {
        setStatus('Käsitellään kuvaa…', 'scanning');
        const c = $('hiddenCanvas'), ctx = c.getContext('2d');
        const minDim = 1200;
        let w = croppedCanvas.width, h = croppedCanvas.height;
        if (Math.max(w,h) < minDim) {
            const s = minDim / Math.max(w,h); w = Math.round(w*s); h = Math.round(h*s);
        }
        c.width = w; c.height = h;
        ctx.drawImage(croppedCanvas, 0, 0, w, h);

        // Contrast stretch
        const img = ctx.getImageData(0, 0, w, h), d = img.data;
        let mn=255, mx=0;
        for (let i=0; i<d.length; i+=4) { let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]; if(g<mn)mn=g; if(g>mx)mx=g; }
        const rng = mx-mn||1;
        for (let i=0; i<d.length; i+=4) {
            let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
            let v = 255/(1+Math.exp(-0.03*(((g-mn)/rng)*255-128)));
            d[i]=d[i+1]=d[i+2]=Math.round(v);
        }
        ctx.putImageData(img, 0, 0);

        showProgress(25);
        setStatus('Tesseract lukee tekstiä…', 'scanning');
        try {
            const res = await Tesseract.recognize(c.toDataURL('image/png'), selectedLang, {
                logger: m => { if(m.status==='recognizing text') showProgress(25+Math.round(m.progress*65)); }
            });
            showProgress(100);
            return res.data.text.trim();
        } catch (err) {
            setStatus('Tesseract-virhe: '+err.message, 'error');
            $('retryArea').classList.add('visible');
            hideProgress();
            return null;
        }
    }

    // Save to Docs
    $('saveDocsBtn').addEventListener('click', async function() {
        const text = $('resultText').innerText.trim();
        if (!text) { setStatus('Ei tekstiä.', 'error'); return; }
        setStatus('Tallennetaan…', 'scanning');
        this.disabled = true;
        try {
            const body = new URLSearchParams();
            body.append('action', 'save');
            body.append('text', text);
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), 15000);
            const res = await fetch(WEB_APP_URL, {
                method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'},
                body, signal: ctrl.signal
            }).catch(() => null);
            clearTimeout(timer);
            if (res) {
                const t = await res.text();
                setStatus(t.includes('VIRHE:') ? 'Virhe: '+t : 'Tallennettu Google Docsiin!', t.includes('VIRHE:') ? 'error' : 'success');
            } else {
                setStatus('Lähetetty! Tarkista Google Docs.', 'success');
            }
        } catch (err) {
            setStatus(err.name==='AbortError' ? 'Aikakatkaisu.' : 'Tarkista Docs.', err.name==='AbortError' ? 'error' : 'success');
        }
        this.disabled = false;
    });

    // Copy
    $('copyBtn').addEventListener('click', async () => {
        const t = $('resultText').innerText;
        try { await navigator.clipboard.writeText(t); } catch {
            const ta=document.createElement('textarea'); ta.value=t;
            document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        }
        $('copyBtn').textContent='✅ Kopioitu!';
        setTimeout(()=>$('copyBtn').textContent='📋 Kopioi',2000);
    });

    // Retry / Retake
    $('retryCropBtn').addEventListener('click', () => {
        if (!lastImageSrc) return;
        ['resultCard','actionBar','retryArea'].forEach(id=>$(id).classList.remove('visible'));
        setStep(2);
        if (cropperInstance) cropperInstance.destroy();
        $('imageToCrop').onload = function() {
            showCropUI();
            cropperInstance = new Cropper($('imageToCrop'), {
                viewMode:1, autoCropArea:0.85, movable:true, zoomable:true, rotatable:true,
            });
        };
        $('imageToCrop').src = lastImageSrc;
        setStatus('Rajaa uudelleen ja paina Skannaa ⬇️', '');
    });

    $('retakeBtn').addEventListener('click', () => {
        resetUI(); setStep(1); $('cameraInput').value = '';
        setStatus('Ota uusi kuva tai valitse tiedosto', '');
    });
</script>
</body>
</html>
